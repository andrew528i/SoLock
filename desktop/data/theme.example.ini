# SoLock desktop theme
#
# Copy this file to ~/.config/solock/theme.ini and adjust the colors.
# All values must be hex colors: #rgb, #rrggbb or #rrggbbaa.
# Any key may be omitted - missing keys fall back to the built-in defaults.
#
# Alpha variants (hover/active/border) are derived automatically from `accent`
# and `border` inside style.css, so themes only supply base colors.

[colors]
bg            = #1c2126
bg_input      = #2d373e
fg            = #d3c6aa
fg_muted      = #9da9a0
fg_dim        = #859289
fg_dimmer     = #7a8478
border        = #4f585e
accent        = #7fbbb3
success       = #a7c080
warning       = #dbbc7f
danger        = #e67e80
group_red     = #e67e80
group_orange  = #e69875
group_yellow  = #dbbc7f
group_green   = #a7c080
group_teal    = #7fbbb3
group_blue    = #7393b3
group_purple  = #d196b3
group_pink    = #d699b6
group_gray    = #859289
